[pytest]
# 命令行参数
addopts = -v -s --alluredir=reports --clean-alluredir

# 测试文件匹配规则
python_files = test_*.py

# 测试类匹配规则
python_classes = Test*

# 测试函数匹配规则
python_functions = test_*

# 指定测试目录
testpaths = tests

# 标记定义
markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    login: 登录相关用例
    end_to_end: 完整流程用例